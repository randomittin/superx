<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>superx — pixel art dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <h1>SUPERX</h1>
        <span id="status-badge" class="status-badge">IDLE</span>
        <span id="phase-info" style="font-size:7px;color:var(--text-dim)">idle | L2</span>
        <span id="project-path" style="font-size:7px;color:var(--accent);margin-left:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Project directory"></span>
      </div>
      <div class="header-right">
        <button id="github-btn" class="btn btn-github" title="Set GitHub remote repo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="image-rendering:pixelated">
            <polygon points="23 9 23 15 22 15 22 17 21 17 21 19 20 19 20 20 19 20 19 21 18 21 18 22 16 22 16 23 15 23 15 18 14 18 14 17 15 17 15 16 17 16 17 15 18 15 18 14 19 14 19 9 18 9 18 6 16 6 16 7 15 7 15 8 14 8 14 7 10 7 10 8 9 8 9 7 8 7 8 6 6 6 6 9 5 9 5 14 6 14 6 15 7 15 7 16 9 16 9 18 7 18 7 17 6 17 6 16 4 16 4 17 5 17 5 19 6 19 6 20 9 20 9 23 8 23 8 22 6 22 6 21 5 21 5 20 4 20 4 19 3 19 3 17 2 17 2 15 1 15 1 9 2 9 2 7 3 7 3 5 4 5 4 4 5 4 5 3 7 3 7 2 9 2 9 1 15 1 15 2 17 2 17 3 19 3 19 4 20 4 20 5 21 5 21 7 22 7 22 9 23 9"/>
          </svg>
        </button>
        <button id="new-project-btn" class="btn btn-new-project" title="New project">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" style="image-rendering:pixelated">
            <rect x="3" y="7" width="10" height="2"/><rect x="7" y="3" width="2" height="10"/>
          </svg>
          <span>NEW</span>
        </button>
        <button id="stop-btn" class="btn btn-stop-icon" title="Stop" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" style="image-rendering:pixelated">
            <rect x="3" y="3" width="10" height="10"/>
          </svg>
          <span>STOP</span>
        </button>
        <button id="history-btn" class="history-btn" title="Past sessions">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="image-rendering:pixelated"><path d="m22,9v-2h-1v-2h-1v-1h-1v-1h-2v-1h-2v-1h-6v1h-2v1h-2v1h-1v1h-1v2h-1v2h-1v6h1v2h1v2h1v1h1v1h2v1h2v1h6v-1h2v-1h2v-1h1v-1h1v-2h1v-2h1v-6h-1Zm-9,7v-1h-1v-1h-1V5h2v8h1v1h1v1h1v1h-1v1h-1v-1h-1Z"/></svg>
        </button>
      </div>

      <!-- GitHub remote URL modal -->
      <div id="github-modal" class="modal-overlay">
        <div class="modal-box">
          <div class="modal-header">
            <span>PROJECT SETTINGS</span>
            <button id="github-modal-close" class="modal-close">X</button>
          </div>
          <div class="modal-body">
            <label style="font-size:7px;color:var(--text-dim);display:block;margin-bottom:4px">PROJECT DIRECTORY (where code gets written)</label>
            <input id="github-path" type="text" class="modal-input"
                   placeholder="~/Downloads/my-project" autocomplete="off">
            <label style="font-size:7px;color:var(--text-dim);display:block;margin:8px 0 4px">GITHUB REMOTE URL (optional)</label>
            <input id="github-url" type="text" class="modal-input"
                   placeholder="https://github.com/user/repo.git" autocomplete="off">
            <div id="github-status" class="modal-status"></div>
          </div>
          <div class="modal-actions">
            <button id="project-save" class="btn btn-approve">SET PROJECT</button>
            <button id="github-save" class="btn btn-approve">PUSH TO GIT</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TIMELINE (top left) -->
    <div class="timeline">
      <div class="timeline-header">
        <span>TIMELINE</span>
        <span id="event-count" style="color:var(--text-dim)">0</span>
      </div>
      <div id="loading-bar" class="loading-bar"><div class="bar"></div></div>
      <div id="timeline-events" class="timeline-events"></div>
      <div id="awaiting-panel" class="awaiting-panel">
        <span class="awaiting-label">CLAUDE IS ASKING — REPLY OR PICK AN OPTION</span>
        <div id="awaiting-question" class="awaiting-question"></div>
        <div id="awaiting-options" class="awaiting-options"></div>
        <div class="awaiting-actions">
          <textarea id="awaiting-input" class="awaiting-input" rows="1"
                    placeholder="Type your reply..."></textarea>
          <button id="awaiting-send" class="btn btn-awaiting-send">SEND</button>
        </div>
      </div>
      <div id="resume-bar" class="resume-bar"></div>
      <div class="prompt-bar">
        <div id="prompt-images" class="image-preview"></div>
        <div class="prompt-row">
          <button id="attach-btn" class="btn btn-attach" title="Attach image"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="image-rendering:pixelated"><polygon points="21 4 21 9 20 9 20 10 19 10 19 11 18 11 18 12 17 12 17 13 16 13 16 14 15 14 15 15 14 15 14 16 13 16 13 17 12 17 12 18 11 18 11 19 8 19 8 18 7 18 7 17 6 17 6 14 7 14 7 13 8 13 8 12 9 12 9 11 10 11 10 10 11 10 11 9 12 9 12 8 13 8 13 7 14 7 14 6 15 6 15 5 16 5 16 6 17 6 17 8 16 8 16 9 15 9 15 10 14 10 14 11 13 11 13 12 12 12 12 13 11 13 11 14 10 14 10 15 9 15 9 16 11 16 11 15 12 15 12 14 13 14 13 13 14 13 14 12 15 12 15 11 16 11 16 10 17 10 17 9 18 9 18 5 17 5 17 4 14 4 14 5 13 5 13 6 12 6 12 7 11 7 11 8 10 8 10 9 9 9 9 10 8 10 8 11 7 11 7 12 6 12 6 13 5 13 5 18 6 18 6 19 7 19 7 20 12 20 12 19 13 19 13 18 14 18 14 17 15 17 15 16 16 16 16 15 17 15 17 14 18 14 18 13 19 13 19 12 20 12 20 13 21 13 21 15 20 15 20 16 19 16 19 17 18 17 18 18 17 18 17 19 16 19 16 20 15 20 15 21 14 21 14 22 13 22 13 23 7 23 7 22 5 22 5 21 4 21 4 20 3 20 3 18 2 18 2 12 3 12 3 11 4 11 4 10 5 10 5 9 6 9 6 8 7 8 7 7 8 7 8 6 9 6 9 5 10 5 10 4 11 4 11 3 12 3 12 2 14 2 14 1 18 1 18 2 19 2 19 3 20 3 20 4 21 4"/></svg></button>
          <input type="file" id="attach-input" accept="image/*" multiple hidden>
          <textarea id="prompt-input" class="prompt-input" rows="1"
                 placeholder="Type a task for superx..." autocomplete="off"></textarea>
          <button id="send-btn" class="btn btn-send">RUN</button>
          <button id="continue-btn" class="btn btn-continue" title="Continue on terminal">TERMINAL</button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL (Game Map + Terminal tabs) -->
    <div class="right-panel">
      <div class="tab-bar">
        <button class="tab active" data-tab="map">MAP</button>
        <button class="tab" data-tab="terminal">LOGS</button>
      </div>

      <!-- Game Map -->
      <div id="tab-map" class="tab-content active">
        <canvas id="map-canvas"></canvas>
        <div class="map-toolbar">
          <button id="zoom-in-btn" class="map-tool-btn" title="Zoom in">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="7" width="10" height="2"/><rect x="7" y="3" width="2" height="10"/></svg>
          </button>
          <button id="zoom-out-btn" class="map-tool-btn" title="Zoom out">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="7" width="10" height="2"/></svg>
          </button>
          <button id="daynight-btn" class="map-tool-btn" title="Toggle day/night">
            <svg id="daynight-icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="image-rendering:pixelated">
              <rect x="7" y="0" width="2" height="2"/><rect x="7" y="14" width="2" height="2"/>
              <rect x="0" y="7" width="2" height="2"/><rect x="14" y="7" width="2" height="2"/>
              <rect x="2" y="2" width="2" height="2"/><rect x="12" y="2" width="2" height="2"/>
              <rect x="2" y="12" width="2" height="2"/><rect x="12" y="12" width="2" height="2"/>
              <rect x="6" y="4" width="4" height="1"/><rect x="5" y="5" width="1" height="1"/><rect x="10" y="5" width="1" height="1"/>
              <rect x="4" y="6" width="1" height="4"/><rect x="11" y="6" width="1" height="4"/>
              <rect x="5" y="10" width="1" height="1"/><rect x="10" y="10" width="1" height="1"/><rect x="6" y="11" width="4" height="1"/>
              <rect x="5" y="5" width="6" height="6"/>
            </svg>
            <svg id="daynight-icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="display:none;image-rendering:pixelated">
              <rect x="6" y="1" width="4" height="2"/><rect x="4" y="3" width="2" height="1"/><rect x="3" y="4" width="1" height="2"/>
              <rect x="2" y="6" width="1" height="4"/><rect x="3" y="10" width="1" height="2"/><rect x="4" y="12" width="2" height="1"/>
              <rect x="6" y="13" width="4" height="2"/><rect x="10" y="12" width="2" height="1"/><rect x="12" y="10" width="1" height="2"/>
              <rect x="10" y="3" width="1" height="1"/><rect x="9" y="4" width="1" height="2"/><rect x="8" y="6" width="1" height="2"/>
              <rect x="9" y="8" width="1" height="1"/><rect x="10" y="9" width="1" height="1"/><rect x="11" y="8" width="1" height="2"/>
              <rect x="12" y="7" width="1" height="3"/>
            </svg>
          </button>
          <button id="fullscreen-btn" class="map-tool-btn" title="Toggle fullscreen">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="image-rendering:pixelated">
              <rect x="0" y="0" width="6" height="2"/><rect x="0" y="2" width="2" height="4"/>
              <rect x="10" y="0" width="6" height="2"/><rect x="14" y="2" width="2" height="4"/>
              <rect x="0" y="10" width="2" height="4"/><rect x="0" y="14" width="6" height="2"/>
              <rect x="14" y="10" width="2" height="4"/><rect x="10" y="14" width="6" height="2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Terminal -->
      <div id="tab-terminal" class="tab-content">
        <div id="terminal-output" class="terminal"></div>
        <div class="logs-bar">
          <button id="copy-logs-btn" class="btn btn-copy-logs" title="Copy all logs to clipboard">COPY LOGS</button>
        </div>
      </div>
    </div>

    <!-- WAR ROOM (below right panel) -->
    <div class="warroom">
      <div class="warroom-header">WAR ROOM</div>
      <div id="agent-grid" class="agent-grid"></div>
    </div>

  </div>

  <!-- History drawer -->
  <div id="history-overlay" class="history-overlay">
    <div class="history-drawer">
      <div class="history-drawer-header">
        <h2>PAST SESSIONS</h2>
        <button id="history-close" class="history-close">X</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="sprites.js"></script>
  <script src="terminal.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>
</body>
</html>
